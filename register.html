<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Inventory System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .auth-container {
            background-color: rgba(30, 34, 42, 0.85);
            backdrop-filter: blur(16px);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .auth-container h2 {
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-size: 1.8rem;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
        }
        .btn-block {
            width: 100%;
            padding: 0.85rem;
            margin-top: 1rem;
            font-size: 1.05rem;
        }
        .auth-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .auth-link:hover {
            color: var(--accent-color);
        }
        .error-msg {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
        .success-msg {
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .password-input-wrapper input {
            padding-right: 2.75rem !important;
        }
        .password-toggle-btn {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.15rem;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: color 0.2s;
        }
        .password-toggle-btn:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Create Account</h2>
        <div class="auth-subtitle">Join the Inventory Management System</div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" required placeholder="Create a password">
                    <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                    <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('confirmPassword', this)" aria-label="Toggle password visibility">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn-primary btn-block" id="registerBtn">Register</button>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
        </form>
        
        <a href="login.html" class="auth-link">Already have an account? <strong>Login here</strong></a>
    </div>

    <script>
        function togglePasswordVisibility(id, btn) {
            const input = document.getElementById(id);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAwq2CmeWz3dyQhsKQ6dmDldqOKWaRUBQ0",
            authDomain: "inventoryapp-395f6.firebaseapp.com",
            projectId: "inventoryapp-395f6",
            storageBucket: "inventoryapp-395f6.firebasestorage.app",
            messagingSenderId: "699684934125",
            appId: "1:699684934125:web:88c1463979739fd57f17e4",
            measurementId: "G-PSC8MSEHFL"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const registerBtn = document.getElementById('registerBtn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match!";
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = "Password must be at least 6 characters long.";
                errorMsg.style.display = 'block';
                return;
            }

            try {
                registerBtn.textContent = 'Registering...';
                registerBtn.disabled = true;

                // Check if user already exists
                const userDoc = await db.collection('users').doc(username.toLowerCase()).get();
                if (userDoc.exists) {
                    errorMsg.textContent = "Username is already taken. Please choose another.";
                    errorMsg.style.display = 'block';
                    registerBtn.textContent = 'Register';
                    registerBtn.disabled = false;
                    return;
                }

                // Check if any super admins exist to assign initial admin role
                const superAdminsSnapshot = await db.collection('users')
                    .where('role', '==', 'super_admin')
                    .limit(1)
                    .get();
                
                const role = superAdminsSnapshot.empty ? 'super_admin' : 'user';

                // Register user
                await db.collection('users').doc(username.toLowerCase()).set({
                    username: username,
                    password: password, // Note: In a real app, never store plain text passwords!
                    role: role,
                    receivesNotifications: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                successMsg.textContent = "Registration successful! Redirecting to login...";
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                console.error("Error during registration:", err);
                errorMsg.textContent = "An error occurred during registration. Check your connection.";
                errorMsg.style.display = 'block';
            } finally {
                registerBtn.textContent = 'Register';
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
