<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventory System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="worksync-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 1rem;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
        }
        .auth-container {
            background-color: var(--surface-color);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .auth-container h2 {
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-size: 1.8rem;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(45,212,191,0.1);
        }
        .btn-block {
            width: 100%;
            padding: 0.85rem;
            margin-top: 1rem;
            font-size: 1.05rem;
        }
        .auth-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .auth-link:hover {
            color: var(--accent-color);
        }
        .error-msg {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .password-input-wrapper input {
            padding-right: 3rem !important;
        }
        .password-toggle-btn {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: color 0.2s;
        }
        .password-toggle-btn:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>System Login</h2>
        <div class="auth-subtitle">Welcome back to Inventory Manager</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" required placeholder="password">
                    <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn-primary btn-block" id="loginBtn">Access Inventory</button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
        
        <a href="register.html" class="auth-link">Don't have an account? <strong>Register here</strong></a>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }

        function togglePasswordVisibility(id, btn) {
            const input = document.getElementById(id);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAwq2CmeWz3dyQhsKQ6dmDldqOKWaRUBQ0",
            authDomain: "inventoryapp-395f6.firebaseapp.com",
            projectId: "inventoryapp-395f6",
            storageBucket: "inventoryapp-395f6.firebasestorage.app",
            messagingSenderId: "699684934125",
            appId: "1:699684934125:web:88c1463979739fd57f17e4",
            measurementId: "G-PSC8MSEHFL"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            errorMsg.style.display = 'none';

            try {
                loginBtn.textContent = 'Authenticating...';
                loginBtn.disabled = true;

                // Check user in Firestore 'users' collection
                const userDoc = await db.collection('users').doc(username).get();
                
                if (userDoc.exists && userDoc.data().password === password) {
                    localStorage.setItem('currentUser', userDoc.data().username);
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = "Invalid username or password!";
                    errorMsg.style.display = 'block';
                }

            } catch (err) {
                console.error("Error during login:", err);
                errorMsg.textContent = "An error occurred during login. Check your connection.";
                errorMsg.style.display = 'block';
            } finally {
                loginBtn.textContent = 'Access Inventory';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
